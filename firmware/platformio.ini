; Station IoT Plantes - Groupe 4
; Configuration PlatformIO pour ESP32-S3-OTG

[platformio]
default_envs = station_plantes

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Optimisations de vitesse pour le scan de dépendances
lib_ldf_mode = chain
lib_compat_mode = strict

; Configuration USB natif ESP32-S3
upload_protocol = esptool
monitor_rts = 0
monitor_dtr = 0

; Port USB-OTG natif (CDC)
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^6.21.3
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit NeoPixel @ ^1.12.0

[env:station_plantes]
build_src_filter = +<*>
build_flags =
    ${env.build_flags}
    -DSTATION_ID=\"adi_4\"
