<article id="scene-panel" class="scene-panel glass">
  <div class="scene-toolbar">
    <div>
      <p class="eyebrow">Plante vivante</p>
      <h2 id="scene-mood">{{ state.mood }}</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div id="scene-vitality" class="vitality vitality-{{ vitality.tone }}" aria-label="Vitalite {{ vitality.label }}">
        {% for segment in vitality.segments %}
          <span class="{% if segment.filled %}filled{% endif %}"></span>
        {% endfor %}
      </div>
      <button id="toggle-diagnostic-btn" class="toggle-diagnostic-btn" aria-label="Afficher ou cacher les détails">
        <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 6 15 12 9 18"></polyline>
        </svg>
        <span class="btn-text">Détails</span>
      </button>
    </div>
  </div>
  <div id="plant-3d" class="plant-viewport" data-reading="{{ payload_json }}"></div>
  <div id="scene-caption" class="scene-caption">
    <strong>{{ state.label }}</strong>
    <span>{{ state.hint }}</span>
  </div>
</article>

<div id="live-payload" class="sr-only" data-reading="{{ payload_json }}"></div>

{% include "dashboard/partials/diagnostic_panel.html" %}
